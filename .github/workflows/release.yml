name: Build and Release Standalone

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: unrpyc_rs
            extension: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: unrpyc_rs.exe
            extension: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: unrpyc_rs
            extension: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Standalone
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package Binary
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }} dist/
          cd dist
          if [ "${{ matrix.platform.extension }}" = "zip" ]; then
            zip ../unrpyc_rs-${{ matrix.platform.target }}.zip ${{ matrix.platform.binary_name }}
          else
            tar -czf ../unrpyc_rs-${{ matrix.platform.target }}.tar.gz ${{ matrix.platform.binary_name }}
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: unrpyc_rs-${{ matrix.platform.target }}.${{ matrix.platform.extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
